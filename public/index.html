<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript → PowerPoint Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>JavaScript → PowerPoint Converter</h1>

        <form id="uploadForm">

            <label><strong>Upload JavaScript (.js)</strong></label>

            <input
                type="file"
                id="script"
                accept=".js">

            <p style="text-align:center;margin:20px 0;font-weight:bold;">
                OR
            </p>

            <label><strong>Paste JavaScript</strong></label>

            <textarea
                id="code"
                rows="20"
                placeholder="Paste your PptxGenJS code here..."></textarea>

            <br><br>

            <label><strong>Output filename</strong></label>

            <input
                id="filename"
                type="text"
                value="presentation"
                placeholder="presentation">

            <br><br>

            <button type="submit">
                🚀 Generate PPT
            </button>

        </form>

        <hr>

        <h3>Status</h3>

        <div id="status"></div>

    </div>

    <script src="app.js"></script>

</body>

</html>
